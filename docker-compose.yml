services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-central}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-central_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-central_contabil}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-central} -d ${POSTGRES_DB:-central_contabil}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-central}:${POSTGRES_PASSWORD:-central_dev_pw}@db:5432/${POSTGRES_DB:-central_contabil}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:4010}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    ports:
      - "4010:4010"

volumes:
  postgres_data:
